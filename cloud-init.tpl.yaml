#cloud-config
package_update: true
packages:
  - nginx

write_files:
  - path: /tmp/index.html.b64
    permissions: "0644"
    content: "${html_b64}"

runcmd:
  - base64 -d /tmp/index.html.b64 > /var/www/html/index.html
  - chown root:root /var/www/html/index.html
  - chmod 0644 /var/www/html/index.html
  - systemctl enable nginx
  - systemctl restart nginx
